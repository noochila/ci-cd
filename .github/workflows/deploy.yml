name: Build and Deploy to Docker Hub

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      HAS_DOCKER_SECRETS: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
      HAS_DEPLOY_SECRETS: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' && secrets.SSH_HOST != '' && secrets.SSH_USERNAME != '' && secrets.SSH_KEY != '' }}
    steps:
    - name: Check Out Repo
      uses: actions/checkout@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      if: env.HAS_DOCKER_SECRETS == 'true'
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v2
      if: env.HAS_DOCKER_SECRETS == 'true'
      with:
        context: .
        file: ./docker/Dockerfile.user
        push: true
        tags: manojnoochila/ci-cd  # Replace with your Docker Hub username and repository

    - name: Verify Pushed Image
      if: env.HAS_DOCKER_SECRETS == 'true'
      run: docker pull manojnoochila/ci-cd  # Replace with your Docker Hub username and repository

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      if: env.HAS_DEPLOY_SECRETS == 'true'
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          sudo docker pull manojnoochila/ci-cd:latest
          sudo docker stop web-app || true
          sudo docker rm web-app || true
          sudo docker run -d --name web-app -p 3005:3000 manojnoochila/ci-cd:latest

    - name: Notify deployment skipped when secrets are missing
      if: env.HAS_DEPLOY_SECRETS != 'true'
      run: echo "Skipping deployment because one or more required deployment secrets are not configured."